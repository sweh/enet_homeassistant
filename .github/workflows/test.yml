name: Integration Tests

on:
  push:
    branches:
      - main
      - master
      - feature/**
  pull_request:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run integration tests
        run: |
          python test_integration.py

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-py${{ matrix.python-version }}
          path: test-results/

  lint:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pylint

      - name: Lint with pylint
        run: |
          pylint --disable=all --enable=E,F custom_components/enet/*.py || true
        continue-on-error: true

  validate-structure:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Validate manifest.json
        run: |
          python -c "
          import json
          with open('custom_components/enet/manifest.json') as f:
              data = json.load(f)
          assert data.get('domain') == 'enet', 'Invalid domain'
          assert data.get('version'), 'Missing version'
          print('✓ manifest.json is valid')
          "

      - name: Validate hacs.json
        run: |
          python -c "
          import json
          with open('custom_components/enet/hacs.json') as f:
              data = json.load(f)
          assert 'domains' in data, 'Missing domains'
          print('✓ hacs.json is valid')
          "

      - name: Check required files
        run: |
          required_files=(
            "custom_components/enet/__init__.py"
            "custom_components/enet/config_flow.py"
            "custom_components/enet/cover.py"
            "custom_components/enet/light.py"
            "custom_components/enet/sensor.py"
            "custom_components/enet/enet.py"
            "custom_components/enet/manifest.json"
            "custom_components/enet/hacs.json"
          )
          
          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "✗ Missing file: $file"
              exit 1
            fi
          done
          echo "✓ All required files present"

  summary:
    if: always()
    needs: [test, lint, validate-structure]
    runs-on: ubuntu-latest
    
    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.test.result }}" == "success" ]; then
            echo "✓ All tests passed"
          else
            echo "✗ Tests failed"
            exit 1
          fi
